[metadata]
name = "sesh-tmux"
description = "Switch to sesh sessions or active tmux sessions"
requirements = ["sesh", "jq", "tmux"]

[source]
command = "current=$(tmux display-message -p '#S' 2>/dev/null || true); sesh list -ctj | jq -r --arg current \"$current\" 'group_by(.Name) | sort_by(.[0].Name | ascii_downcase) | .[] | { name: .[0].Name, active: any(.[]; .Src == \"tmux\"), current: any(.[]; .Src == \"tmux\" and .Name == $current) } | [(if .current then \"●\" else \"○\" end), (if .active then \"󰆍\" else \"\" end), .name] | join(\" \")'"

[keybindings]
enter = "actions:connect"
ctrl-x = ["actions:kill_session", "reload_source"]

[actions.connect]
description = "Connect to selected session"
command = "sh -c 'name=$(printf \"%s\" \"$1\" | sed \"s/^[^ ]* [^ ]* //\"); [ -n \"$name\" ] && sesh connect \"$name\"' sh '{}'"
mode = "execute"

[actions.kill_session]
description = "Kill selected tmux session"
command = "sh -c 'name=$(printf \"%s\" \"$1\" | sed \"s/^[^ ]* [^ ]* //\"); tmux has-session -t \"$name\" 2>/dev/null && tmux kill-session -t \"$name\"' sh '{}'"
mode = "fork"
