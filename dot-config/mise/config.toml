bottom      = 'latest'
codex       = 'latest'
delta       = 'latest'
direnv      = 'latest'
eza         = 'latest'
fd          = 'latest'
fzf         = 'latest'
github-cli  = 'latest'
glow        = 'latest'
gum         = 'latest'
jq          = 'latest'
just        = 'latest'
lazydocker  = 'latest'
lazygit     = 'latest'
neovim      = 'stable'
opencode    = 'latest'
pi          = 'latest'
resvg       = 'latest'
ripgrep     = 'latest'
starship    = 'latest'
television  = 'latest'
tmux        = 'latest'
tree-sitter = 'latest'
uv          = 'latest'
yazi        = 'latest'
zellij      = 'latest'
zoxide      = 'latest'

'github:joshmedeski/sesh'     = 'latest'
